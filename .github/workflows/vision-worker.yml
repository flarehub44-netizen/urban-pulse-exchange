name: Vision Worker

on:
  workflow_dispatch:
  schedule:
    # Roda 1 ciclo a cada 5 minutos (limite do GitHub Actions é ~5 min mínimo na prática)
    - cron: "*/5 * * * *"

concurrency:
  group: vision-worker
  cancel-in-progress: false

jobs:
  run-once:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r services/vision-worker/requirements.txt

      - name: Poll cameras once
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VISION_WORKER_SOURCE: github-actions
        run: |
          cd services/vision-worker
          python run_once.py
